# Search space configuration for MNIST experiments
# Can be used for both MLP and DeepSets architectures

# MLP-specific parameters
num_layers: [2, 3]
hidden_units1: [8, 16, 32, 64, 128]
activation1: ["relu", "tanh", "sigmoid"]
batchnorm1: [true, false]
hidden_units2: [8, 16, 32, 64]
activation2: ["relu", "tanh", "sigmoid"]  
batchnorm2: [true, false]

# DeepSets-specific parameters
bottleneck_range: [3, 6]  # 2^3 to 2^6 for bottleneck dimension
aggregator_space: ["mean", "max"]
phi_len_range: [1, 3]  # Number of layers in phi network
rho_len_range: [1, 3]  # Number of layers in rho network

# Shared hyperparameters
learning_rate: [0.0001, 0.001, 0.01]
dropout_rate: [0.0, 0.1, 0.2, 0.3]
batch_size: [32, 64, 128, 256]

# Hardware configuration targets
hardware_targets:
  boards: ["pynq-z2", "zcu102", "alveo-u200"]
  precisions: ["ap_fixed<2,1>", "ap_fixed<8,3>", "ap_fixed<16,6>"]
  reuse_factors: [1, 2, 4, 8, 16, 32, 64]
  strategies: ["Latency", "Resource"]