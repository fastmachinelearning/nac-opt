# Block-based Neural Architecture Search Configuration
# This file defines the search space for block-based architectures like BraggNN

search_spaces:
  # Channel dimensions for convolutional layers
  channel_space: [4, 8, 16, 32, 64]
  
  # MLP layer widths  
  mlp_width_space: [4, 8, 16, 32, 64]
  
  # Convolutional kernel sizes
  kernel_space: [1, 3, 5]
  
  # Activation functions
  act_space:
    - "ReLU"
    - "LeakyReLU" 
    - "GELU"
    - "Identity"
  
  # Normalization methods
  norm_space: [null, "batch", "layer"]
  
  # Available block types
  block_types: ["Conv", "ConvAttn", "None"]
  
  # Convolutional attention specific parameters
  conv_attn:
    hidden_channel_space: [1, 2, 4, 8, 16, 32]

# Fixed hyperparameters for the architecture
hyperparameters:
  # Number of blocks in the architecture
  num_blocks: 3
  
  # Initial image size (e.g., 11x11 for BraggNN, 9x9 for other tasks)
  initial_img_size: 11
  
  # Output dimension (2 for regression tasks like BraggNN, num_classes for classification)
  output_dim: 2

# Optional: Task-specific configurations
task_config:
  # Task type: "regression" or "classification"
  task_type: "regression"
  
  # Loss function: "mse", "categorical_crossentropy", "sparse_categorical_crossentropy"
  loss_function: "mse"
  
  # Metrics to track during training
  metrics: ["mae"]
  
  # Input data specifications
  input_channels: 1  # Number of input channels (1 for grayscale, 3 for RGB)
  
# Optional: Training hyperparameters that can be searched
training_search_space:
  learning_rate: [0.001, 0.01, 0.1]
  batch_size: [32, 64, 128, 256]
  optimizer: ["adam", "rmsprop", "sgd"]

# Hardware deployment configuration (optional)
hardware_config:
  target_platform: "fpga"
  precision_options: ["ap_fixed<8,3>", "ap_fixed<16,6>", "ap_fixed<32,16>"]
  reuse_factors: [1, 2, 4, 8]
  strategies: ["Latency", "Resource"]