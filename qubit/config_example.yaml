# Example configuration file for global search
# Use with: python run_global_search.py --config config_example.yaml

# Search parameters
n_trials: 25
epochs: 10
n_folds: 3

# Dataset parameters
subset_size: 100000
data_dir: "../qubit/data"
start_location: 100
window_size: 400
num_classes: 2

# Paths
search_space_path: "qubit_search_space.yaml"
results_dir: "./results/global_search_run1"

# Model settings
model_type: "block"  # or "mlp"
use_hardware_metrics: true
one_hot: true
normalize: false
flatten: true

# Output
verbose: true
