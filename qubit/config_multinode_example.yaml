# Example configuration file for multi-node Optuna global search
# Use with: python run_global_search.py --config config_multinode_example.yaml

# Search parameters
n_trials: 1000  # Total trials across all nodes
epochs: 10
n_folds: 3

# Dataset parameters
subset_size: 100000
data_dir: "../qubit/data"
start_location: 100
window_size: 400
num_classes: 2

# Paths
search_space_path: "qubit_search_space.yaml"
results_dir: "./results/global_search_multinode"

# Model settings
model_type: "block"  # or "mlp"
use_hardware_metrics: true
one_hot: true
normalize: false
flatten: true

# Output
verbose: true

# Optuna multi-node configuration
# These can also be set via environment variables:
#   export OPTUNA_STORAGE="postgresql://user:pass@host:5432/optuna_db"
#   export OPTUNA_STUDY_NAME="qubit_experiment_v1"
#
# For PostgreSQL (recommended for production):
# optuna_storage: "postgresql://user:password@db-host:5432/optuna_db"
#
# For SQLite on shared filesystem (works if all nodes can access it):
# optuna_storage: "sqlite:///shared/path/optuna.db"
#
# Study name (all nodes must use the same name to coordinate):
# optuna_study_name: "qubit_search_experiment_2026"
