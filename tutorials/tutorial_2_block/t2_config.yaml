# Tutorial 2: Block-based search on Fashion-MNIST
# =================================================
# Config-driven entry point for tutorial_2_block.py / tutorial_2_block.ipynb

dataset:
  name: fashion_mnist
  resize_val: 16
  subset_size: 20000
  flatten: false
  one_hot: true

search:
  model_type: block
  n_trials: 15
  epochs: 15
  n_folds: 3
  use_hardware_metrics: false
  objective_names: [performance_metric, bops]
  maximize_flags: [true, false]

search_space:
  channel_space: [4, 8, 16]
  mlp_width_space: [5, 16, 32, 64]
  kernel_space: [1, 3, 5]
  act_space: [ReLU, GELU, LeakyRelu]
  norm_space: [null, batch]
  # block_types: [Conv, MLP, None]
  block_types: [Conv, ConvAttn, MLP, None]
  num_blocks: 4
  initial_img_size: 16
  output_dim: 10
  output_activation: softmax
  conv_attn:
    hidden_channel_space: [4, 8, 16]

hls_config:
  board: zcu102
  model:
    precision: "ap_fixed<8,3>"
    reuse_factor: 1
    strategy: Latency

local_search:
  qat_epochs: 10
  pruning_iterations: 10
  pruning_epochs: 10
  pruning_rate: 0.7
  precision_pairs:
    - {total_bits: 16, int_bits: 6}
    - {total_bits: 8,  int_bits: 3}
    - {total_bits: 6,  int_bits: 2}
    - {total_bits: 4,  int_bits: 1}

output:
  results_dir: ./results/tutorial2_block_attention
